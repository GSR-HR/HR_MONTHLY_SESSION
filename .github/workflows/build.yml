name: 오늘의 브리핑 갱신

on:
  schedule:
    # KST 08:00 = UTC 23:00 (전날). 일~목 UTC = 월~금 KST
    - cron: "0 23 * * 0-4"
  workflow_dispatch: {}   # 수동 실행 버튼

permissions:
  contents: write

concurrency:
  group: briefing
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: 노션 수집 및 요약 생성
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MASK_PEOPLE: "1"
        run: python -u scripts/build.py

      - name: 변경분 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data.json

          if git diff --staged --quiet; then
            echo "변경 없음"
            exit 0
          fi

          git commit -m "chore: 브리핑 갱신 $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M')"

          # 실행 중에 원격이 앞서갔을 수 있으므로 rebase 후 푸시
          for i in 1 2 3; do
            if git pull --rebase --autostash origin main && git push origin main; then
              echo "푸시 완료"
              exit 0
            fi
            echo "푸시 재시도 $i"
            sleep 5
          done

          echo "3회 시도 후 실패"
          exit 1
